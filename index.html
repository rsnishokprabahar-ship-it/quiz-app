<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz App</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav>
      <div style="display:flex; align-items:center; gap:10px;">
        <img src="assets/logo.png" alt="Logo" />
        <h3>QuizApp</h3>
      </div>
      <p class="userText"></p>
    </nav>

    <main class="loginPage">
      <img
        class="backgroundImg"
        src="assets/q-faq-concept-with-tiny-people-characters-big-question-mark-vector-illustration_746655-9563.jpg"
        alt=""
      />
      <div class="container">
        <h2>Login</h2>
        <img src="assets/cardLogo.png" alt="User Icon" />
        <input type="text" placeholder="Enter your name" id="userName" />
        <button id="startBtn">Start Quiz</button>
        <p style="color:red; display:none" id="errorMsg">*Please enter your name</p> 
      </div>
    </main>

    <div class="quizzPage" style="display: none;">
        <div class="timer">00:57</div>
      <div class="quizWrapper">
      
        
        <div class="questionNumber">
          <p>Question <span id="questionStat">1/10</span></p>
        </div>

        <div class="quizzContainer">
         <!-- questions will be displayed here dynamically -->
        </div>

        <div class="nextBtn">
          <button type="submit">Next Question</button>
        </div>
      </div>
    </div>

    <div class="resultPage" style="display: none;">
      <div class="resultContainer">
        <div class="imgIcon">
          <img src="https://cdn-icons-png.flaticon.com/512/5951/5951703.png" alt="Trophy" />
        </div>
        <h3>You've completed the Quiz!</h3>
        <div class="scoreText">
            <p>Your Score</p>
            <div class="scoreCircle">
                <span id="userScore">8</span> / 10
            </div>
        </div>
        <div class="resultButtons">
            <button class="replayBtn">Replay Quiz</button>
            <button class="quitBtn">Quit</button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
